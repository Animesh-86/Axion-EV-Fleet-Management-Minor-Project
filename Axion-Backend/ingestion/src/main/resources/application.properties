spring.application.name=Axion

# ── Infrastructure ──────────────────────────────────
# Kafka
axion.kafka.bootstrap-servers=localhost:9092
axion.kafka.consumer.group-id=digital-twin-updater
axion.kafka.consumer.auto-offset-reset=earliest
axion.kafka.producer.retries=5
axion.kafka.producer.max-in-flight=5
axion.kafka.producer.request-timeout-ms=30000
axion.kafka.producer.delivery-timeout-ms=120000

# MQTT
axion.mqtt.broker-url=tcp://localhost:1883
axion.mqtt.client-id=axion-ingestion-service
axion.mqtt.topics=axion/telemetry/+,axion/heartbeat/+
axion.mqtt.qos=1
axion.mqtt.completion-timeout-ms=5000

# Redis
axion.redis.ttl-seconds=120

# CORS
axion.cors.allowed-origins=http://localhost:3000

# ── Kafka Topics ────────────────────────────────────
axion.kafka.topic.telemetry=telemetry.normal
axion.kafka.topic.ota-events=ota.events

# ── Health Scoring ──────────────────────────────────
axion.health.base-score=100
axion.health.soc-critical=15.0
axion.health.soc-warning=30.0
axion.health.battery-temp-warning=45.0
axion.health.battery-temp-critical=55.0
axion.health.packet-loss-warning=5.0
axion.health.packet-loss-critical=10.0
axion.health.penalty-warning=30
axion.health.penalty-critical=60
